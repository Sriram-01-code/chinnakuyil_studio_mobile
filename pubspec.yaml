name: chinnakuyil_studio
description: Chinnakuyil Studio 2.0 - Premium Mobile Suite for Sathiya
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Backend
  firebase_core: 3.6.0
  cloud_firestore: 5.4.4
  http: ^1.2.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  
  # Mobile Media & Recording
  record: ^5.1.0
  audioplayers: 5.2.1
  youtube_player_iframe: 5.1.0
  flutter_inappwebview: ^6.0.0
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  file_picker: ^8.0.1
  path: ^1.9.0
  
  # Mobile Storage
  sqflite: 2.3.3+1
  
  # App Updates
  package_info_plus: ^4.2.0
  version: ^3.0.2
  in_app_update: ^4.2.0
  
  # UI & FX
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  confetti: ^0.7.0
  vibration: ^2.0.1
  
  # Utilities
  device_info_plus: ^9.1.0
  intl: ^0.18.1
  flutter_spinkit: ^5.2.1
  cupertino_icons: ^1.0.2
  share_plus: ^7.2.1
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# Removed overrides to allow proper cloud resolution
flutter:
  uses-material-design: true
  assets:
    - assets/background.png
    - assets/archives/
    - assets/sfx/
